# Hydra configuration for GRPO alignment.
defaults:
  - defaults/training/base
  - _self_

out_dir: out/grpo

init_from: ???
ref_from: ???

group_size: 4
num_steps: 1000

batch_size: 4

max_prompt_len: 128
max_response_len: 128

learning_rate: 1.0e-5
min_lr: 1.0e-6
weight_decay: 0.01
beta: 0.04
eps: 0.2
allow_dropout: false

num_train: 2000
num_val: 300
eval_interval: 100

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .
