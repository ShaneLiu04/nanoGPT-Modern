repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=100"]
        files: ^(model|training|inference|evaluation|utils|data|rewards)/.*\.py$|export_to_.*\.py|api_server\.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^(model|training|inference|evaluation|utils|data|rewards)/.*\.py$|export_to_.*\.py|api_server\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-tqdm, pydantic]
        args: ["--ignore-missing-imports", "--no-namespace-packages"]
        files: ^(model|training|inference|evaluation|utils|data|rewards)/.*\.py$|export_to_.*\.py|api_server\.py$

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest -x --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
